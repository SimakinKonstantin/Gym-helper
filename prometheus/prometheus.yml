global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus-gateway-service'
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'prometheus-management-service'
    static_configs:
      - targets: ['host.docker.internal:8082']

  - job_name: 'prometheus-auth-service'
    static_configs:
      - targets: ['host.docker.internal:8081']

  - job_name: 'prometheus-statistics-service'
    static_configs:
      - targets: [ 'host.docker.internal:8083']
