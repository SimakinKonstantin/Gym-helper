name: training-app
services:
  gateway:
    build:
      context: gateway
    ports:
      - "8080:8080"
    depends_on:
      - management-service
      - auth-service
      - statistics-service
    networks:
      - app-network
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - MANAGEMENT_SERVICE_URL=http://management-service:8082
      - STATISTICS_SERVICE_URL=http://statistics-service:8083
      - KAFKA_TOPIC=statistics
      - KAFKA_ADDR=kafka:9092

  management-service:
    build:
      context: management-service
    ports:
      - "8082:8082"
    depends_on:
      postgres-management:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres-management:5432/management?sslmode=disable

  auth-service:
    build:
      context: auth-service
    ports:
      - "8081:8081"
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres-auth:5432/auth?sslmode=disable
      - SECRET=secret

  statistics-service:
    build:
      context: ./statistics-service
    ports:
      - "8083:8083"
    depends_on:
      postgres-statistics:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres-statistics:5432/statistics?sslmode=disable
      - KAFKA_ADDR=kafka:9092
      - KAFKA_TOPIC=statistics

  kafka:
    image: bitnamilegacy/kafka:3.9.0
    ports:
      - "9092:9092"
      - "9093:9093"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    environment:
      - BITNAMI_DEBUG=true
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
    attach: false
    volumes:
      - kafka_:/bitnami/kafka

  postgres-auth:
    image: postgres:16
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app-network
    attach: false
    volumes:
      - postgres_auth_:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=auth

  postgres-statistics:
    image: postgres:16
    ports:
      - "5435:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app-network
    attach: false
    volumes:
      - postgres_statistics_:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=statistics

  postgres-management:
    image: postgres:16
    ports:
      - "5436:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - app-network
    attach: false
    volumes:
      - postgres_management_:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=management

  prometheus:
    image: prom/prometheus:latest
    attach: false
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app-network

  grafana:
    image: grafana/grafana-oss:latest
    attach: false
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - app-network
    volumes:
      - grafana_:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro


networks:
  app-network:
    driver: bridge

volumes:
  kafka_:
  postgres_management_:
  postgres_auth_:
  postgres_statistics_:
  grafana_:


